<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body style="margin:0;background:#0a0b0f;color:#f0f1f5;font-family:DM Sans,sans-serif">
<div id="root"></div>
<div id="styles"></div>
<script>
// Inject styles
document.getElementById("styles").outerHTML = "<style>" + `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0f;--bg2:#111318;--bg3:#1a1d25;--bg4:#22262f;--border:#2a2d38;--border2:#363a47;--text:#f0f1f5;--text2:#9da3b4;--text3:#6b7280;--accent:#7c6af7;--accent2:#5b4dd4;--accent-glow:rgba(124,106,247,0.15);--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--r:12px;--r2:8px;--shadow:0 4px 24px rgba(0,0,0,.4)}
html{height:100%;background:var(--bg)}
body{font-family:"DM Sans",sans-serif;font-size:15px;line-height:1.6;min-height:100%}
h1,h2,h3,h4{font-family:"Syne",sans-serif;font-weight:700;line-height:1.2}
button{font-family:"DM Sans",sans-serif;cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:"DM Sans",sans-serif;outline:none;border:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.content{flex:1;padding:28px 32px;max-width:1400px;width:100%}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-family:"Syne",sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-section{padding:16px 12px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:var(--r2);cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .15s;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent)}
.nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:99px}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--r2)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.badge{padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-admin{background:rgba(124,106,247,.2);color:var(--accent)}
.badge-member{background:rgba(34,197,94,.15);color:var(--green)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,106,247,.3)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{padding:8px;border-radius:var(--r2);background:var(--bg3);color:var(--text2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.btn-icon:hover{background:var(--bg4);color:var(--text)}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text2)}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;color:var(--text);font-size:14px;transition:border-color .15s;width:100%}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-close{background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.s-todo{background:rgba(107,114,128,.2);color:#9da3b4}
.s-in_progress{background:rgba(59,130,246,.15);color:var(--blue)}
.s-review{background:rgba(245,158,11,.15);color:var(--yellow)}
.s-done{background:rgba(34,197,94,.15);color:var(--green)}
.p-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.p-low{background:rgba(107,114,128,.15);color:var(--text3)}
.p-medium{background:rgba(59,130,246,.15);color:var(--blue)}
.p-high{background:rgba(245,158,11,.15);color:var(--yellow)}
.p-critical{background:rgba(239,68,68,.15);color:var(--red)}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:all .15s}
.task-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.task-card.overdue{border-left:3px solid var(--red)}
.project-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.project-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc, var(--accent))}
.project-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden}
.auth-page::before{content:"";position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(124,106,247,.12) 0%,transparent 70%);pointer-events:none}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.error-msg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red);border-radius:var(--r2);padding:10px 14px;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--r2);padding:4px}
.tab{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;background:transparent;border:none;font-family:inherit}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
.kanban-col{min-width:260px;width:260px;background:var(--bg3);border-radius:var(--r);display:flex;flex-direction:column;max-height:calc(100vh - 220px)}
.kanban-col-header{padding:12px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.kanban-col-body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1}
.kanban-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;cursor:pointer;transition:all .15s}
.kanban-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.member-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.divider{height:1px;background:var(--border);margin:16px 0}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.fade-in{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.progress-bar{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:12px}
.w-full{width:100%}
` + "</style>";
</script>
<script type="text/babel">
const { useState, useEffect, useContext, createContext } = React;
const API = 'http://localhost:3001/api';

async function req(method, path, body, token) {
  const h = {'Content-Type':'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, {method, headers:h, body: body ? JSON.stringify(body) : undefined});
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || d.errors?.[0]?.msg || 'Request failed');
  return d;
}

const Ctx = createContext(null);

const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f97316','#22c55e','#06b6d4','#f59e0b','#ef4444'];
const SL = {todo:'To Do',in_progress:'In Progress',review:'Review',done:'Done'};
const SI = {todo:'○',in_progress:'◐',review:'◉',done:'✓'};
const PI = {low:'↓',medium:'→',high:'↑',critical:'⚡'};

const aC = n => ['#6366f1','#8b5cf6','#ec4899','#f97316','#22c55e','#06b6d4','#3b82f6','#f59e0b'][n?.charCodeAt(0)%8||0];
const ini = n => (n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtD = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
const isOD = (d,s) => d && new Date(d) < new Date() && s !== 'done';

function Av({name,sz=30}){return <div className="avatar" style={{width:sz,height:sz,background:aC(name),fontSize:sz>28?13:11,color:'#fff'}}>{ini(name)}</div>}
function Spin(){return <span style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}} className="spin"/>}
function SPill({s}){return <span className={`status-pill s-${s}`}>{SI[s]} {SL[s]}</span>}
function PPill({p}){return <span className={`p-pill p-${p}`}>{PI[p]} {p}</span>}

function Provider({children}){
  const [user,setUser] = useState(null);
  const [token,setToken] = useState(()=>localStorage.getItem('tf'));
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    if(token) req('GET','/auth/me',null,token).then(d=>setUser(d.user)).catch(()=>{setToken(null);localStorage.removeItem('tf')}).finally(()=>setLoading(false));
    else setLoading(false);
  },[token]);
  const login = async(e,p)=>{const d=await req('POST','/auth/login',{email:e,password:p});setToken(d.token);setUser(d.user);localStorage.setItem('tf',d.token);};
  const signup = async(n,e,p)=>{const d=await req('POST','/auth/signup',{name:n,email:e,password:p});setToken(d.token);setUser(d.user);localStorage.setItem('tf',d.token);};
  const logout = ()=>{setToken(null);setUser(null);localStorage.removeItem('tf');};
  return <Ctx.Provider value={{user,token,login,signup,logout,loading}}>{children}</Ctx.Provider>;
}

function Modal({title,onClose,children,footer}){
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[]);
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal fade-in">
      <div className="modal-header"><h2 style={{fontSize:18}}>{title}</h2><button className="modal-close" onClick={onClose}>×</button></div>
      {children}
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

function CreateProject({onClose,onDone}){
  const {token}=useContext(Ctx);
  const [f,sf]=useState({name:'',description:'',color:COLORS[0]});
  const [loading,sl]=useState(false);const [err,se]=useState('');
  const go=async e=>{e.preventDefault();sl(true);se('');try{const d=await req('POST','/projects',f,token);onDone(d.project);onClose();}catch(x){se(x.message);sl(false);}};
  return <Modal title="New Project" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={go} disabled={loading}>{loading?<Spin/>:'Create'}</button></>}>
    {err&&<div className="error-msg">⚠ {err}</div>}
    <div className="form-group"><label className="form-label">Name *</label><input className="form-input" value={f.name} onChange={e=>sf(x=>({...x,name:e.target.value}))} required/></div>
    <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:70,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
    <div className="form-group"><label className="form-label">Color</label><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{COLORS.map(c=><div key={c} onClick={()=>sf(x=>({...x,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:f.color===c?'3px solid #fff':'3px solid transparent',boxShadow:f.color===c?'0 0 0 2px '+c:'none',transition:'all .15s'}}/>)}</div></div>
  </Modal>;
}

function CreateTask({onClose,onDone,projectId,projects,users}){
  const {token}=useContext(Ctx);
  const [f,sf]=useState({title:'',description:'',projectId:projectId||'',assigneeId:'',status:'todo',priority:'medium',dueDate:''});
  const [loading,sl]=useState(false);const [err,se]=useState('');
  const go=async e=>{e.preventDefault();sl(true);se('');try{const b={...f};if(!b.assigneeId)delete b.assigneeId;if(!b.dueDate)delete b.dueDate;const d=await req('POST','/tasks',b,token);onDone(d.task);onClose();}catch(x){se(x.message);sl(false);}};
  return <Modal title="New Task" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={go} disabled={loading}>{loading?<Spin/>:'Create'}</button></>}>
    {err&&<div className="error-msg">⚠ {err}</div>}
    <div className="form-group"><label className="form-label">Title *</label><input className="form-input" value={f.title} onChange={e=>sf(x=>({...x,title:e.target.value}))} required/></div>
    <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:60,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
    {!projectId&&<div className="form-group"><label className="form-label">Project *</label><select className="form-input" value={f.projectId} onChange={e=>sf(x=>({...x,projectId:e.target.value}))} required><option value="">Select...</option>{projects?.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
    <div className="form-row">
      <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={f.status} onChange={e=>sf(x=>({...x,status:e.target.value}))}>{Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Priority</label><select className="form-input" value={f.priority} onChange={e=>sf(x=>({...x,priority:e.target.value}))}>{['low','medium','high','critical'].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
    </div>
    <div className="form-row">
      <div className="form-group"><label className="form-label">Assignee</label><select className="form-input" value={f.assigneeId} onChange={e=>sf(x=>({...x,assigneeId:e.target.value}))}><option value="">Unassigned</option>{users?.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Due Date</label><input className="form-input" type="date" value={f.dueDate} onChange={e=>sf(x=>({...x,dueDate:e.target.value}))}/></div>
    </div>
  </Modal>;
}

function TaskDetail({task,onClose,onUpdated,onDeleted,users}){
  const {token,user}=useContext(Ctx);
  const [f,sf]=useState({title:task.title,description:task.description||'',status:task.status,priority:task.priority,assigneeId:task.assigneeId||'',dueDate:task.dueDate?task.dueDate.split('T')[0]:''});
  const [loading,sl]=useState(false);const [err,se]=useState('');
  const canEdit = user.role==='admin'||task.assigneeId===user.id||task.createdBy===user.id;
  const save=async()=>{sl(true);se('');try{const d=await req('PUT','/tasks/'+task.id,{...f,assigneeId:f.assigneeId||null,dueDate:f.dueDate||null},token);onUpdated(d.task);onClose();}catch(x){se(x.message);sl(false);}};
  const del=async()=>{if(!confirm('Delete?'))return;await req('DELETE','/tasks/'+task.id,null,token);onDeleted(task.id);onClose();};
  return <Modal title="Task" onClose={onClose} footer={<>
    {(user.role==='admin'||task.createdBy===user.id)&&<button className="btn btn-danger btn-sm" onClick={del}>Delete</button>}
    <div style={{flex:1}}/>
    <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
    {canEdit&&<button className="btn btn-primary" onClick={save} disabled={loading}>{loading?<Spin/>:'Save'}</button>}
  </>}>
    {err&&<div className="error-msg">⚠ {err}</div>}
    <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}><SPill s={task.status}/><PPill p={task.priority}/>{task.project&&<span className="tag" style={{borderColor:task.project.color,color:task.project.color}}>{task.project.name}</span>}{isOD(task.dueDate,task.status)&&<span className="tag" style={{borderColor:'var(--red)',color:'var(--red)'}}>⚠ Overdue</span>}</div>
    {canEdit?<>
      <div className="form-group"><label className="form-label">Title</label><input className="form-input" value={f.title} onChange={e=>sf(x=>({...x,title:e.target.value}))}/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:70,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={f.status} onChange={e=>sf(x=>({...x,status:e.target.value}))}>{Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Priority</label><select className="form-input" value={f.priority} onChange={e=>sf(x=>({...x,priority:e.target.value}))}>{['low','medium','high','critical'].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
      </div>
      <div className="form-row">

  return <div className="auth-page">
    <div className="auth-card fade-in" style={{position:'relative',zIndex:1}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28,justifyContent:'center'}}><div className="logo-icon">⚡</div><div className="logo-text" style={{fontFamily:'Syne',fontWeight:800,fontSize:22,background:'linear-gradient(135deg,#fff,var(--accent))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>TaskFlow</div></div>
      <h1 style={{fontSize:22,fontWeight:800,textAlign:'center',marginBottom:6}}>{mode==='login'?'Welcome back':'Create account'}</h1>
      <p style={{color:'var(--text2)',textAlign:'center',marginBottom:24,fontSize:14}}>{mode==='login'?'Sign in to your workspace':'Start managing your team'}</p>
      {err&&<div className="error-msg">⚠ {err}</div>}
      <form onSubmit={go}>
        {mode==='signup'&&<div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Jane Doe" value={f.name} onChange={e=>sf(x=>({...x,name:e.target.value}))} required/></div>}
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="you@example.com" value={f.email} onChange={e=>sf(x=>({...x,email:e.target.value}))} required/></div>
        <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={f.password} onChange={e=>sf(x=>({...x,password:e.target.value}))} required minLength={6}/></div>
        {mode==='signup'&&<p style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>💡 First registered user becomes Admin automatically.</p>}
        <button className="btn btn-primary w-full" style={{justifyContent:'center'}} disabled={loading}>{loading?<Spin/>:(mode==='login'?'→ Sign In':'→ Create Account')}</button>
      </form>
      <p style={{textAlign:'center',fontSize:14,color:'var(--text2)',marginTop:18}}>{mode==='login'?<>No account? <span style={{color:'var(--accent)',cursor:'pointer',fontWeight:600}} onClick={()=>sm('signup')}>Sign up</span></>:<>Have an account? <span style={{color:'var(--accent)',cursor:'pointer',fontWeight:600}} onClick={()=>sm('login')}>Sign in</span></>}</p>
    </div>
  </div>;
}

function Shell(){
  const {user,logout}=useContext(Ctx);
  const [page,sp]=useState('dashboard');const [projId,spj]=useState(null);
  const nav=(p,id)=>{sp(p);if(id)spj(id);};
  const navItems=[['dashboard','⚡','Dashboard'],['projects','📁','Projects'],['tasks','✅','Tasks'],['team','👥','Team']];
  const renderPage=()=>{
    if(page==='project'&&projId)return <ProjectDetail id={projId} onBack={()=>sp('projects')}/>;
    switch(page){case 'dashboard':return <Dashboard onNav={nav}/>;case 'projects':return <Projects onNav={nav}/>;case 'tasks':return <Tasks/>;case 'team':return <Team/>;default:return <Dashboard onNav={nav}/>;}
  };
  return <div className="app">
    <aside className="sidebar">
      <div className="sidebar-logo"><div className="logo-icon">⚡</div><div className="logo-text">TaskFlow</div></div>
      <div className="nav-section">Menu</div>
      {navItems.map(([id,icon,label])=><div key={id} className={'nav-item'+(page===id||(page==='project'&&id==='projects')?' active':'')} onClick={()=>nav(id)}><span style={{fontSize:16,width:20,textAlign:'center'}}>{icon}</span>{label}</div>)}
      <div style={{marginTop:'auto',padding:16,borderTop:'1px solid var(--border)'}}>
        <div className="user-chip">
          <Av name={user.name} sz={32}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.name}</div><div style={{fontSize:11,color:'var(--text3)',textTransform:'capitalize'}}>{user.role}</div></div>
          <button className="btn-icon" onClick={logout} title="Sign out" style={{fontSize:14}}>⎋</button>
        </div>
      </div>
    </aside>
    <main className="main">
      <div className="topbar">
        <div style={{flex:1,fontFamily:'Syne',fontWeight:600,fontSize:15}}>{page==='project'?'← Projects':navItems.find(n=>n[0]===page)?.[2]||'Dashboard'}</div>
        <span className={'badge badge-'+user.role}>{user.role}</span>
        <Av name={user.name} sz={32}/>
      </div>
      <div className="content">{renderPage()}</div>
    </main>
  </div>;
}

function App(){
  const {user,loading}=useContext(Ctx);
  if(loading)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:16}}>⚡</div><div style={{display:'inline-block',width:20,height:20,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}} className="spin"/></div></div>;
  return user ? <Shell/> : <Auth/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Provider><App/></Provider>);
</script>
</body>
</html>
