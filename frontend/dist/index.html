<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>

<body style="margin:0;background:#0a0b0f;color:#f0f1f5;font-family:DM Sans,sans-serif">
<div id="root"></div>
<div id="styles"></div>

<script>
document.getElementById("styles").outerHTML = "<style>" + `
/* (UNCHANGED YOUR CSS — keep as it is) */
` + "</style>";
</script>

<script type="text/babel">

const { useState, useEffect, useContext, createContext } = React;

const AppContext = createContext(null);
const Ctx = createContext(null);

const API = 'https://web-production-38d896.up.railway.app/api';

async function req(method, path, body, token) {
  const h = {'Content-Type':'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;

  const r = await fetch(API + path, {
    method,
    headers: h,
    body: body ? JSON.stringify(body) : undefined
  });

  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Request failed');
  return d;
}

/* ---------------- CONTEXT ---------------- */

function Provider({children}){
  const [user,setUser] = useState(null);
  const [token,setToken] = useState(localStorage.getItem('tf'));
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    if(token){
      req('GET','/auth/me',null,token)
        .then(d=>setUser(d.user))
        .catch(()=>{setToken(null);localStorage.removeItem('tf')})
        .finally(()=>setLoading(false));
    } else setLoading(false);
  },[token]);

  const login = async(e,p)=>{
    const d = await req('POST','/auth/login',{email:e,password:p});
    setToken(d.token);
    setUser(d.user);
    localStorage.setItem('tf',d.token);
  };

  const signup = async(n,e,p)=>{
    const d = await req('POST','/auth/signup',{name:n,email:e,password:p});
    setToken(d.token);
    setUser(d.user);
    localStorage.setItem('tf',d.token);
  };

  const logout = ()=>{
    setToken(null);
    setUser(null);
    localStorage.removeItem('tf');
  };

  return (
    <Ctx.Provider value={{user,token,login,signup,logout,loading}}>
      {children}
    </Ctx.Provider>
  );
}

/* ---------------- AUTH ---------------- */

function Auth(){
  const {login,signup}=useContext(Ctx);
  const [mode,setMode]=useState('login');
  const [f,setF]=useState({name:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async(e)=>{
    e.preventDefault();
    setLoading(true);
    setErr('');
    try{
      if(mode==='login') await login(f.email,f.password);
      else await signup(f.name,f.email,f.password);
    }catch(x){setErr(x.message)}
    setLoading(false);
  };

  return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#111318',padding:30,borderRadius:12,width:320}}>
        <h2>{mode==='login'?'Login':'Signup'}</h2>

        {err && <p style={{color:'red'}}>{err}</p>}

        <form onSubmit={submit}>
          {mode==='signup' &&
            <input placeholder="Name"
              onChange={e=>setF({...f,name:e.target.value})}/>
          }

          <input placeholder="Email"
            onChange={e=>setF({...f,email:e.target.value})}/>

          <input placeholder="Password" type="password"
            onChange={e=>setF({...f,password:e.target.value})}/>

          <button disabled={loading}>
            {loading?'Loading...':mode}
          </button>
        </form>

        <p style={{cursor:'pointer',color:'#7c6af7'}}
           onClick={()=>setMode(mode==='login'?'signup':'login')}>
          Switch to {mode==='login'?'Signup':'Login'}
        </p>
      </div>
    </div>
  );
}

/* ---------------- SHELL (ROLE FIX) ---------------- */

function Shell(){
  const {user,logout}=useContext(Ctx);
  const [page,setPage]=useState('dashboard');

  // ✅ ROLE BASED MENU
  const isAdmin = user.role === 'admin';

  const navItems = [
    ['dashboard','⚡','Dashboard'],
    ['tasks','✅','Tasks'],
    ...(isAdmin ? [
      ['projects','📁','Projects'],
      ['team','👥','Team']
    ] : [])
  ];

  return (
    <div style={{display:'flex'}}>
      {/* SIDEBAR */}
      <div style={{width:220,background:'#111'}}>
        <h3 style={{padding:10}}>TaskFlow</h3>

        {navItems.map(([id,icon,label])=>(
          <div key={id}
            onClick={()=>setPage(id)}
            style={{padding:10,cursor:'pointer'}}>
            {icon} {label}
          </div>
        ))}

        <button onClick={logout}>Logout</button>
      </div>

      {/* MAIN */}
      <div style={{padding:20}}>
        <h2>
          {page.toUpperCase()} - {user.role}
        </h2>

        {isAdmin
          ? <p>Admin dashboard (full access)</p>
          : <p>Member dashboard (limited access)</p>
        }
      </div>
    </div>
  );
}

/* ---------------- APP ---------------- */

function App(){
  const {user,loading}=useContext(Ctx);

  if(loading)
    return <p>Loading...</p>;

  return user ? <Shell/> : <Auth/>;
}

ReactDOM.createRoot(document.getElementById('root'))
.render(
  <Provider>
    <App/>
  </Provider>
);

</script>
</body>
</html>
