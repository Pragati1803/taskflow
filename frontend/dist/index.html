<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05060a;
  --bg2:#0a0c12;
  --bg3:#101421;
  --bg4:#171c2b;
  --surface:#0c111d;
  --panel:rgba(18,24,40,.62);
  --panel-strong:rgba(16,20,34,.8);
  --border:rgba(255,255,255,.08);
  --border-soft:rgba(255,255,255,.05);
  --border-glow:rgba(122,102,255,.32);
  --text:#f6f8ff;
  --text2:#a5afc7;
  --text3:#6a738f;
  --accent:#7a66ff;
  --accent2:#54a7ff;
  --accent3:#81f2d0;
  --accent-red:#ff6f86;
  --green:#3dde95;
  --red:#ff7187;
  --yellow:#ffc86d;
  --blue:#6eadff;
  --radius-lg:16px;
  --radius-md:12px;
  --radius-sm:10px;
  --shadow-1:0 14px 34px rgba(0,0,0,.32);
  --shadow-2:0 24px 80px rgba(0,0,0,.46);
  --shadow-glow:0 0 0 1px rgba(122,102,255,.28),0 20px 46px rgba(81,65,181,.34);
  --ease:cubic-bezier(.2,.68,.2,1);
}
html,body{height:100%}
body{
  font-family:'Inter','DM Sans',sans-serif;
  font-size:15px;
  line-height:1.58;
  color:var(--text);
  background:
    radial-gradient(52rem 28rem at 8% -8%,rgba(122,102,255,.22),transparent 60%),
    radial-gradient(42rem 20rem at 92% -6%,rgba(84,167,255,.16),transparent 62%),
    linear-gradient(180deg,#04050a,#060812 32%,#060a13 100%);
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.22;
  background-image:radial-gradient(rgba(255,255,255,.25) .4px, transparent .6px);
  background-size:3px 3px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.45),transparent 70%);
  z-index:0;
}
h1,h2,h3,h4{
  font-family:'Syne',sans-serif;
  font-weight:700;
  line-height:1.12;
  letter-spacing:-.025em;
}
button,input,textarea,select{font-family:'Inter','DM Sans',sans-serif;outline:none;border:none}
button{cursor:pointer}
::selection{background:rgba(122,102,255,.34);color:white}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(162,173,204,.35);border-radius:999px}

.app{display:flex;min-height:100vh;position:relative;z-index:1}
.app::before,.app::after{content:'';position:fixed;border-radius:50%;filter:blur(68px);pointer-events:none;z-index:0;animation:ambientFloat 14s ease-in-out infinite}
.app::before{width:340px;height:340px;left:-120px;top:18vh;background:rgba(122,102,255,.2)}
.app::after{width:380px;height:380px;right:-120px;bottom:10vh;background:rgba(84,167,255,.14);animation-delay:-5s}

.role-page,.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;position:relative;overflow:hidden}
.role-page::before,.auth-page::before{content:'';position:absolute;inset:-12% 16% auto 16%;height:430px;background:radial-gradient(circle at center,rgba(122,102,255,.24),transparent 72%);pointer-events:none}
.role-wrap{position:relative;z-index:2;width:100%;max-width:940px;text-align:center}
.role-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:34px}
.logo-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(140deg,var(--accent),var(--accent2));box-shadow:0 12px 28px rgba(122,102,255,.36)}
.role-title{font-size:clamp(34px,4.6vw,48px);font-weight:800;margin-bottom:10px}
.role-sub{color:var(--text2);font-size:15px;max-width:560px;margin:0 auto 36px}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:24px}
.role-card{
  background:var(--panel);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:22px;
  padding:30px 24px;
  cursor:pointer;
  transition:transform .48s var(--ease),border-color .42s var(--ease),box-shadow .42s var(--ease);
  position:relative;
  overflow:hidden;
  text-align:left;
}
.role-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .4s var(--ease)}
.role-card::after{content:'';position:absolute;inset:1px;border-radius:21px;border:1px solid rgba(255,255,255,.045);pointer-events:none}
.role-card.admin-card::before{background:radial-gradient(circle at 80% -10%,rgba(122,102,255,.36),transparent 55%)}
.role-card.member-card::before{background:radial-gradient(circle at 80% -10%,rgba(61,222,149,.28),transparent 55%)}
.role-card:hover{transform:translateY(-7px);border-color:rgba(255,255,255,.2)}
.role-card:hover::before{opacity:1}
.role-card.admin-card:hover{box-shadow:var(--shadow-glow)}
.role-card.member-card:hover{box-shadow:0 0 0 1px rgba(61,222,149,.24),0 20px 42px rgba(32,128,92,.28)}
.role-icon{font-size:42px;margin-bottom:14px;display:block}
.role-card h3{font-size:20px;font-weight:800;margin-bottom:9px}
.role-card p{font-size:13px;color:var(--text2);line-height:1.55}
.role-perms{margin-top:13px;display:flex;flex-direction:column;gap:6px}
.perm{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px}
.perm.yes{color:var(--text2)}
.perm .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.perm.yes .dot{background:var(--green)}
.role-note{font-size:13px;color:var(--text3)}

.auth-card{
  background:var(--panel-strong);
  border:1px solid var(--border);
  border-radius:22px;
  padding:34px;
  width:100%;
  max-width:448px;
  position:relative;
  z-index:2;
  box-shadow:var(--shadow-2);
  backdrop-filter:blur(18px);
}
.auth-card::before{content:'';position:absolute;inset:0;border-radius:22px;background:linear-gradient(150deg,rgba(255,255,255,.08),transparent 42%);pointer-events:none}
.auth-role-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:20px;cursor:pointer;transition:all .38s var(--ease)}
.auth-role-badge.admin{background:rgba(122,102,255,.16);color:#bcaeff;border:1px solid rgba(122,102,255,.36)}
.auth-role-badge.member{background:rgba(61,222,149,.13);color:#93f0bf;border:1px solid rgba(61,222,149,.3)}
.auth-role-badge:hover{transform:translateY(-2px)}
.auth-title{font-size:28px;margin-bottom:7px;letter-spacing:-.03em}
.auth-sub{color:var(--text2);font-size:14px;margin-bottom:24px}

.sidebar{
  width:264px;
  min-width:264px;
  background:linear-gradient(180deg,rgba(11,15,25,.9),rgba(11,14,23,.74));
  backdrop-filter:blur(16px);
  border-right:1px solid var(--border-soft);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;
  left:0;
  height:100vh;
  z-index:100;
  overflow-y:auto;
}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent)}
.sidebar::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.035),transparent 34%);pointer-events:none}
.main{flex:1;margin-left:264px;min-height:100vh;display:flex;flex-direction:column}
.topbar{
  height:72px;
  background:rgba(8,11,18,.64);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border-soft);
  display:flex;
  align-items:center;
  padding:0 30px;
  gap:16px;
  position:sticky;
  top:0;
  z-index:60;
}
.topbar>div:first-child{font-size:14px!important;letter-spacing:.02em;color:#c4cae2;text-transform:uppercase}
.content{flex:1;padding:36px 38px 92px;max-width:1520px;width:100%}
.sidebar-logo{padding:23px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-soft)}

.nav-item{display:flex;align-items:center;gap:11px;padding:11px 15px;margin:3px 8px;border-radius:12px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:600;transition:all .4s var(--ease);position:relative;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.045);color:var(--text);transform:translateX(2px)}
.nav-item.active{background:linear-gradient(140deg,rgba(122,102,255,.24),rgba(84,167,255,.14));border-color:rgba(122,102,255,.34);color:#f0f2ff;box-shadow:0 10px 26px rgba(88,74,188,.36)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:56%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:99px}
.nav-item.locked{opacity:.42;cursor:not-allowed}
.nav-item.locked:hover{background:transparent;color:var(--text2);transform:none}
.nav-lock{font-size:11px;margin-left:auto;opacity:.72}

.role-banner{margin:0 8px 9px;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.role-banner.admin{background:rgba(122,102,255,.14);color:#bcaeff;border:1px solid rgba(122,102,255,.28)}
.role-banner.member{background:rgba(61,222,149,.1);color:#8ce9b7;border:1px solid rgba(61,222,149,.25)}

.form-group{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;color:#b6bed8;letter-spacing:.03em}
.form-input{background:rgba(15,21,37,.92);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:11px 14px;color:var(--text);font-size:14px;transition:border-color .34s var(--ease),box-shadow .34s var(--ease),background .34s var(--ease);width:100%}
.form-input:focus{border-color:rgba(122,102,255,.72);box-shadow:0 0 0 3px rgba(122,102,255,.2);background:rgba(17,23,40,.98)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.error-msg{background:rgba(255,113,135,.12);border:1px solid rgba(255,113,135,.34);color:#ff9cac;border-radius:11px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.info-box{border-radius:11px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
.info-box.admin{background:rgba(122,102,255,.1);border:1px solid rgba(122,102,255,.25);color:#bcaeff}
.info-box.member{background:rgba(61,222,149,.08);border:1px solid rgba(61,222,149,.22);color:#8ce9b7}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:transform .38s var(--ease),box-shadow .38s var(--ease),background .38s var(--ease),border-color .38s var(--ease),color .38s var(--ease);white-space:nowrap;border:1px solid transparent;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:-72% auto auto -25%;width:68%;height:240%;transform:rotate(24deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);opacity:0;transition:opacity .35s var(--ease),transform .55s var(--ease);pointer-events:none}
.btn:hover::after{opacity:.7;transform:translateX(150%) rotate(24deg)}
.btn-primary{background:linear-gradient(138deg,var(--accent),var(--accent2));color:white;box-shadow:0 10px 30px rgba(99,81,226,.45)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(99,81,226,.58)}
.btn-primary.green{background:linear-gradient(138deg,#31d888,#58e8ab);color:#04140d;box-shadow:0 10px 28px rgba(61,222,149,.34)}
.btn-primary.green:hover{box-shadow:0 14px 34px rgba(61,222,149,.46)}
.btn-ghost{background:rgba(255,255,255,.03);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--text);transform:translateY(-1px)}
.btn-danger{background:rgba(255,113,135,.12);color:#ff9cab;border:1px solid rgba(255,113,135,.34)}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-icon{padding:8px;border-radius:10px;background:rgba(255,255,255,.03);color:var(--text2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .38s var(--ease);font-family:inherit}
.btn-icon:hover{background:rgba(255,255,255,.1);color:var(--text);transform:translateY(-1px)}
.w-full{width:100%}

.card,.stat-card,.project-card,.task-card,.kanban-col,.kanban-card,.modal{background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--border);box-shadow:var(--shadow-1);position:relative;overflow:hidden}
.card::before,.stat-card::before,.project-card::after,.task-card::before,.kanban-col::before,.modal::before{content:'';position:absolute;inset:0;background:linear-gradient(148deg,rgba(255,255,255,.06),transparent 44%);pointer-events:none}
.card{border-radius:var(--radius-lg);padding:24px}
.stat-card{border-radius:var(--radius-lg);padding:22px 24px;display:flex;flex-direction:column;gap:8px;transition:transform .42s var(--ease),border-color .42s var(--ease),box-shadow .42s var(--ease)}
.stat-card:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.17);box-shadow:0 24px 48px rgba(0,0,0,.4)}
.project-card{border-radius:var(--radius-lg);padding:22px;cursor:pointer;transition:all .46s var(--ease);position:relative}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pc,var(--accent)),rgba(255,255,255,.86))}
.project-card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-6px);box-shadow:0 24px 52px rgba(0,0,0,.44)}
.task-card{border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:all .42s var(--ease)}
.task-card:hover{border-color:rgba(255,255,255,.18);transform:translateY(-4px);box-shadow:0 18px 38px rgba(0,0,0,.38)}
.task-card.overdue{border-left:3px solid var(--red)}

.status-pill,.p-pill,.badge,.tag{border:1px solid transparent}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;backdrop-filter:blur(6px)}
.s-todo{background:rgba(160,169,194,.16);color:#c0c7dc;border-color:rgba(160,169,194,.26)}
.s-in_progress{background:rgba(110,173,255,.18);color:#a8d2ff;border-color:rgba(110,173,255,.3)}
.s-review{background:rgba(255,200,109,.18);color:#ffe0a1;border-color:rgba(255,200,109,.32)}
.s-done{background:rgba(61,222,149,.17);color:#aaf0ca;border-color:rgba(61,222,149,.28)}
.p-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.46px}
.p-low{background:rgba(160,169,194,.14);color:#bac2d9}
.p-medium{background:rgba(110,173,255,.16);color:#a6d1ff}
.p-high{background:rgba(255,200,109,.16);color:#ffdd98}
.p-critical{background:rgba(255,113,135,.16);color:#ff9eaf}
.badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-admin{background:rgba(122,102,255,.18);color:#bcaeff;border-color:rgba(122,102,255,.3)}
.badge-member{background:rgba(61,222,149,.14);color:#8ce9b7;border-color:rgba(61,222,149,.26)}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:8px;font-size:12px;background:rgba(255,255,255,.02);border-color:var(--border);color:var(--text2)}

.modal-overlay{position:fixed;inset:0;background:rgba(2,4,10,.66);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(9px)}
.modal{border-radius:20px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.modal-close{background:rgba(255,255,255,.04);color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .36s var(--ease)}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--text)}

.access-denied{text-align:center;padding:92px 20px}
.access-icon{font-size:64px;margin-bottom:20px;opacity:.7}
.access-title{font-size:24px;font-weight:800;margin-bottom:10px;color:var(--text)}
.access-desc{font-size:14px;color:var(--text2);max-width:360px;margin:0 auto 28px}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(304px,1fr));gap:20px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:31px!important;letter-spacing:-.03em;margin-bottom:6px}
.page-header p{font-size:14px!important;color:var(--text2)!important}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
.kanban-col{min-width:280px;width:280px;border-radius:15px;display:flex;flex-direction:column;max-height:calc(100vh - 236px)}
.kanban-col-header{padding:12px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.kanban-col-body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1}
.kanban-card{border-radius:11px;padding:12px;cursor:pointer;transition:all .4s var(--ease)}
.kanban-card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-3px)}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px;padding:4px}
.tab{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .36s var(--ease);background:transparent;border:none;font-family:inherit}
.tab.active{background:rgba(122,102,255,.22);color:var(--text);box-shadow:0 8px 18px rgba(88,74,188,.3)}
.empty-state{text-align:center;padding:68px 20px;color:var(--text2)}
.member-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.member-row:last-child{border-bottom:none}
.divider{height:1px;background:var(--border);margin:16px 0}
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-top:12px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;color:#fff;box-shadow:0 10px 20px rgba(0,0,0,.3)}

.fade-in{animation:sectionIn .62s var(--ease)}
.project-card,.task-card,.stat-card,.member-row,.kanban-card,.card,.auth-card,.role-card{animation:cardReveal .58s var(--ease) both}
.grid-auto>.project-card:nth-child(2),.grid-4>.stat-card:nth-child(2),.kanban-col-body>.kanban-card:nth-child(2){animation-delay:.07s}
.grid-auto>.project-card:nth-child(3),.grid-4>.stat-card:nth-child(3),.kanban-col-body>.kanban-card:nth-child(3){animation-delay:.14s}
.grid-auto>.project-card:nth-child(4),.grid-4>.stat-card:nth-child(4),.kanban-col-body>.kanban-card:nth-child(4){animation-delay:.2s}
.project-card:nth-child(1),.task-card:nth-child(1){animation-delay:.03s}
.project-card:nth-child(2),.task-card:nth-child(2){animation-delay:.1s}
.project-card:nth-child(3),.task-card:nth-child(3){animation-delay:.16s}
.project-card:nth-child(4),.task-card:nth-child(4){animation-delay:.22s}
.spin{animation:sp 1s linear infinite}

@keyframes sectionIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardReveal{from{opacity:0;transform:translateY(16px) scale(.986)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes ambientFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

.main.main-framed{margin-left:0;width:100%;padding:24px 0 80px}

  .mobile-nav-item.active{background:rgba(122,102,255,.24);color:#fff;border-color:rgba(122,102,255,.34)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useContext, createContext } = React;
const API = window.location.origin + '/api';

async function req(method, path, body, token) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || d.errors?.[0]?.msg || 'Request failed');
  return d;
}

const Ctx = createContext(null);
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f97316','#22c55e','#06b6d4','#f59e0b','#ef4444'];
const SL = { todo:'To Do', in_progress:'In Progress', review:'Review', done:'Done' };
const SI = { todo:'○', in_progress:'◐', review:'◉', done:'✓' };
const PI = { low:'↓', medium:'→', high:'↑', critical:'⚡' };

const aC = n => ['#6366f1','#8b5cf6','#ec4899','#f97316','#22c55e','#06b6d4','#3b82f6','#f59e0b'][(n||'').charCodeAt(0)%8||0];
const ini = n => (n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const fmtD = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
const isOD = (d,s) => d && new Date(d) < new Date() && s !== 'done';

function Av({name,sz=30}){ return <div className="avatar" style={{width:sz,height:sz,background:aC(name),fontSize:sz>28?13:11}}>{ini(name)}</div>; }
function Spin(){ return <span style={{display:'inline-block',width:14,height:14,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}} className="spin"/>; }
function SPill({s}){ return <span className={`status-pill s-${s}`}>{SI[s]} {SL[s]}</span>; }
function PPill({p}){ return <span className={`p-pill p-${p}`}>{PI[p]} {p}</span>; }

// ── AUTH PROVIDER ─────────────────────────────────────────────────────────────
function Provider({ children }) {
  const [user, setUser]   = useState(null);
  const [token, setToken] = useState(() => localStorage.getItem('tf'));
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (token) {
      req('GET', '/auth/me', null, token)
        .then(d => setUser(d.user))
        .catch(() => { setToken(null); localStorage.removeItem('tf'); })
        .finally(() => setLoading(false));
    } else setLoading(false);
  }, [token]);

  const login = async (email, password) => {
    const d = await req('POST', '/auth/login', { email, password });
    setToken(d.token); setUser(d.user); localStorage.setItem('tf', d.token);
    return d;
  };
  const signup = async (name, email, password, role) => {
    const d = await req('POST', '/auth/signup', { name, email, password, role });
    setToken(d.token); setUser(d.user); localStorage.setItem('tf', d.token);
    return d;
  };
  const logout = () => { setToken(null); setUser(null); localStorage.removeItem('tf'); };

  return <Ctx.Provider value={{ user, token, login, signup, logout, loading }}>{children}</Ctx.Provider>;
}

// ── ROLE PICKER ───────────────────────────────────────────────────────────────
function RolePicker({ onPick }) {
  return (
    <div className="role-page">
      <div className="role-wrap fade-in">
        <div className="role-logo">
          <div className="logo-icon">⚡</div>
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:24,background:'linear-gradient(135deg,#fff,var(--accent))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>TaskFlow</div>
        </div>
        <h1 className="role-title">Who are you?</h1>
        <p className="role-sub">Choose your role to continue. This shapes what you can do inside.</p>

        <div className="role-cards">
          {/* ADMIN CARD */}
          <div className="role-card admin-card" onClick={() => onPick('admin')}>
            <span className="role-icon">🛡️</span>
            <h3 style={{color:'var(--accent)'}}>Admin</h3>
            <p>Full control over projects, teams and tasks.</p>
            <div className="role-perms">
              {['Create & delete projects','Manage team members','Assign tasks to anyone','View all projects','Full dashboard access'].map(p =>
                <div key={p} className="perm yes"><span className="dot"/>{p}</div>
              )}
            </div>
            <div style={{marginTop:18,padding:'8px 0',borderTop:'1px solid var(--border)',fontSize:12,color:'var(--accent)',fontWeight:600}}>→ Continue as Admin</div>
          </div>

          {/* MEMBER CARD */}
          <div className="role-card member-card" onClick={() => onPick('member')}>
            <span className="role-icon">👤</span>
            <h3 style={{color:'var(--green)'}}>Member</h3>
            <p>Work on assigned tasks within your projects.</p>
            <div className="role-perms">
              {[['View assigned projects',true],['Create & update tasks',true],['Track your own work',true],['Create projects',false],['Manage team members',false]].map(([p,y]) =>
                <div key={p} className={`perm ${y?'yes':''}`}><span className="dot"/>{p}</div>
              )}
            </div>
            <div style={{marginTop:18,padding:'8px 0',borderTop:'1px solid var(--border)',fontSize:12,color:'var(--green)',fontWeight:600}}>→ Continue as Member</div>
          </div>
        </div>
        <p className="role-note">Your actual permissions are enforced by the server — this just tailors the experience.</p>
      </div>
    </div>
  );
}

// ── AUTH PAGE ─────────────────────────────────────────────────────────────────
function AuthPage({ pickedRole, onChangeRole }) {
  const { login, signup } = useContext(Ctx);
  const [mode, sm] = useState('login');
  const [f, sf] = useState({ name:'', email:'', password:'' });
  const [loading, sl] = useState(false);
  const [err, se] = useState('');

  const isAdmin = pickedRole === 'admin';

  const go = async e => {
    e.preventDefault(); sl(true); se('');
    try {
      if (mode === 'login') await login(f.email, f.password);
      else await signup(f.name, f.email, f.password, pickedRole);
    } catch(x) { se(x.message); } finally { sl(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card fade-in">
        {/* Role badge — click to go back */}
        <div style={{marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button className={`auth-role-badge ${pickedRole}`} onClick={onChangeRole}>
            {isAdmin ? '🛡️ Admin' : '👤 Member'} <span style={{opacity:.6,fontSize:11}}>← change</span>
          </button>
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:16,background:'linear-gradient(135deg,#fff,var(--accent))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>⚡ TaskFlow</div>
        </div>

        <h1 className="auth-title">{mode==='login'?'Welcome back':'Create account'}</h1>
        <p className="auth-sub" style={{marginBottom:16}}>{mode==='login'?`Sign in as ${pickedRole}`:`Register as ${pickedRole}`}</p>

        {/* Contextual info box */}
        <div className={`info-box ${pickedRole}`}>
          <span>{isAdmin ? '🛡️' : '👤'}</span>
          <div>
            {isAdmin
              ? mode==='login'
                ? 'Admins can manage all projects, teams, and tasks across the workspace.'
                : 'Registering as Admin gives you full workspace control. The very first account is always Admin.'
              : mode==='login'
                ? 'Members can view assigned projects and manage their own tasks.'
                : 'Registering as Member — an Admin will add you to projects.'
            }
          </div>
        </div>

        {err && <div className="error-msg">⚠ {err}</div>}

        <form onSubmit={go}>
          {mode==='signup' && (
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Jane Doe" value={f.name} onChange={e=>sf(x=>({...x,name:e.target.value}))} required/>
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={f.email} onChange={e=>sf(x=>({...x,email:e.target.value}))} required/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="••••••••" value={f.password} onChange={e=>sf(x=>({...x,password:e.target.value}))} required minLength={6}/>
          </div>

          <button className={`btn btn-primary w-full ${isAdmin?'':'green'}`} style={{justifyContent:'center',marginTop:4}} disabled={loading}>
            {loading ? <Spin/> : (mode==='login' ? `→ Sign In as ${pickedRole}` : `→ Create ${pickedRole} account`)}
          </button>
        </form>

        <p style={{textAlign:'center',fontSize:14,color:'var(--text2)',marginTop:18}}>
          {mode==='login'
            ? <>No account? <span style={{color:'var(--accent)',cursor:'pointer',fontWeight:600}} onClick={()=>sm('signup')}>Sign up</span></>
            : <>Have an account? <span style={{color:'var(--accent)',cursor:'pointer',fontWeight:600}} onClick={()=>sm('login')}>Sign in</span></>
          }
        </p>
      </div>
    </div>
  );
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  useEffect(() => {
    const h = e => { if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal fade-in">
        <div className="modal-header"><h2 style={{fontSize:18}}>{title}</h2><button className="modal-close" onClick={onClose}>×</button></div>
        {children}
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

function CreateProject({ onClose, onDone }) {
  const { token } = useContext(Ctx);
  const [f, sf] = useState({ name:'', description:'', color:COLORS[0] });
  const [loading, sl] = useState(false); const [err, se] = useState('');
  const go = async e => { e.preventDefault(); sl(true); se(''); try { const d = await req('POST','/projects',f,token); onDone(d.project); onClose(); } catch(x) { se(x.message); sl(false); } };
  return (
    <Modal title="New Project" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={go} disabled={loading}>{loading?<Spin/>:'Create'}</button></>}>
      {err&&<div className="error-msg">⚠ {err}</div>}
      <div className="form-group"><label className="form-label">Name *</label><input className="form-input" value={f.name} onChange={e=>sf(x=>({...x,name:e.target.value}))} required/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:70,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
      <div className="form-group"><label className="form-label">Color</label><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{COLORS.map(c=><div key={c} onClick={()=>sf(x=>({...x,color:c}))} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',border:f.color===c?'3px solid #fff':'3px solid transparent',boxShadow:f.color===c?'0 0 0 2px '+c:'none',transition:'all .15s'}}/>)}</div></div>
    </Modal>
  );
}

function CreateTask({ onClose, onDone, projectId, projects, users }) {
  const { token } = useContext(Ctx);
  const [f, sf] = useState({ title:'', description:'', projectId:projectId||'', assigneeId:'', status:'todo', priority:'medium', dueDate:'' });
  const [loading, sl] = useState(false); const [err, se] = useState('');
  const go = async e => { e.preventDefault(); sl(true); se(''); try { const b={...f}; if(!b.assigneeId)delete b.assigneeId; if(!b.dueDate)delete b.dueDate; const d=await req('POST','/tasks',b,token); onDone(d.task); onClose(); } catch(x) { se(x.message); sl(false); } };
  return (
    <Modal title="New Task" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={go} disabled={loading}>{loading?<Spin/>:'Create'}</button></>}>
      {err&&<div className="error-msg">⚠ {err}</div>}
      <div className="form-group"><label className="form-label">Title *</label><input className="form-input" value={f.title} onChange={e=>sf(x=>({...x,title:e.target.value}))} required/></div>
      <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:60,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
      {!projectId&&<div className="form-group"><label className="form-label">Project *</label><select className="form-input" value={f.projectId} onChange={e=>sf(x=>({...x,projectId:e.target.value}))} required><option value="">Select...</option>{projects?.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>}
      <div className="form-row">
        <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={f.status} onChange={e=>sf(x=>({...x,status:e.target.value}))}>{Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Priority</label><select className="form-input" value={f.priority} onChange={e=>sf(x=>({...x,priority:e.target.value}))}>{['low','medium','high','critical'].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Assignee</label><select className="form-input" value={f.assigneeId} onChange={e=>sf(x=>({...x,assigneeId:e.target.value}))}><option value="">Unassigned</option>{users?.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
        <div className="form-group"><label className="form-label">Due Date</label><input className="form-input" type="date" value={f.dueDate} onChange={e=>sf(x=>({...x,dueDate:e.target.value}))}/></div>
      </div>
    </Modal>
  );
}

function TaskDetail({ task, onClose, onUpdated, onDeleted, users }) {
  const { token, user } = useContext(Ctx);
  const [f, sf] = useState({ title:task.title, description:task.description||'', status:task.status, priority:task.priority, assigneeId:task.assigneeId||'', dueDate:task.dueDate?task.dueDate.split('T')[0]:'' });
  const [loading, sl] = useState(false); const [err, se] = useState('');
  const canEdit = user.role==='admin'||task.assigneeId===user.id||task.createdBy===user.id;
  const save = async () => { sl(true); se(''); try { const d=await req('PUT','/tasks/'+task.id,{...f,assigneeId:f.assigneeId||null,dueDate:f.dueDate||null},token); onUpdated(d.task); onClose(); } catch(x) { se(x.message); sl(false); } };
  const del = async () => { if(!confirm('Delete this task?'))return; await req('DELETE','/tasks/'+task.id,null,token); onDeleted(task.id); onClose(); };
  return (
    <Modal title="Task Details" onClose={onClose} footer={<>
      {(user.role==='admin'||task.createdBy===user.id)&&<button className="btn btn-danger btn-sm" onClick={del}>Delete</button>}
      <div style={{flex:1}}/>
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      {canEdit&&<button className="btn btn-primary" onClick={save} disabled={loading}>{loading?<Spin/>:'Save'}</button>}
    </>}>
      {err&&<div className="error-msg">⚠ {err}</div>}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}><SPill s={task.status}/><PPill p={task.priority}/>{task.project&&<span className="tag" style={{borderColor:task.project.color,color:task.project.color}}>{task.project.name}</span>}{isOD(task.dueDate,task.status)&&<span className="tag" style={{borderColor:'var(--red)',color:'var(--red)'}}>⚠ Overdue</span>}</div>
      {canEdit ? <>
        <div className="form-group"><label className="form-label">Title</label><input className="form-input" value={f.title} onChange={e=>sf(x=>({...x,title:e.target.value}))}/></div>
        <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" style={{minHeight:70,resize:'vertical'}} value={f.description} onChange={e=>sf(x=>({...x,description:e.target.value}))}/></div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={f.status} onChange={e=>sf(x=>({...x,status:e.target.value}))}>{Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
          <div className="form-group"><label className="form-label">Priority</label><select className="form-input" value={f.priority} onChange={e=>sf(x=>({...x,priority:e.target.value}))}>{['low','medium','high','critical'].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Assignee</label><select className="form-input" value={f.assigneeId} onChange={e=>sf(x=>({...x,assigneeId:e.target.value}))}><option value="">Unassigned</option>{users?.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
          <div className="form-group"><label className="form-label">Due Date</label><input className="form-input" type="date" value={f.dueDate} onChange={e=>sf(x=>({...x,dueDate:e.target.value}))}/></div>
        </div>
      </> : <>
        <p style={{color:'var(--text2)',fontSize:14,marginBottom:12}}>{task.description||'No description'}</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <div><div className="form-label">Assignee</div>{task.assignee?.name||'Unassigned'}</div>
          <div><div className="form-label">Due</div><span style={{color:isOD(task.dueDate,task.status)?'var(--red)':'inherit'}}>{fmtD(task.dueDate)||'None'}</span></div>
        </div>
      </>}
      <div className="divider"/>
      <div style={{fontSize:12,color:'var(--text3)'}}>Created {fmtD(task.createdAt)} · Updated {fmtD(task.updatedAt)}</div>
    </Modal>
  );
}

function AddMember({ projectId, onClose, onAdded }) {
  const { token } = useContext(Ctx);
  const [users, su] = useState([]); const [sel, ss] = useState(''); const [role, sr] = useState('member');
  const [loading, sl] = useState(false); const [err, se] = useState('');
  useEffect(() => { req('GET','/auth/users',null,token).then(d=>su(d.users)); }, []);
  const go = async e => { e.preventDefault(); if(!sel)return; sl(true); se(''); try { const d=await req('POST','/projects/'+projectId+'/members',{userId:sel,role},token); onAdded(d.member); onClose(); } catch(x) { se(x.message); sl(false); } };
  return (
    <Modal title="Add Member" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={go} disabled={loading||!sel}>{loading?<Spin/>:'Add'}</button></>}>
      {err&&<div className="error-msg">⚠ {err}</div>}
      <div className="form-group"><label className="form-label">User</label><select className="form-input" value={sel} onChange={e=>ss(e.target.value)}><option value="">Select user...</option>{users.map(u=><option key={u.id} value={u.id}>{u.name} ({u.email})</option>)}</select></div>
      <div className="form-group"><label className="form-label">Role in project</label><select className="form-input" value={role} onChange={e=>sr(e.target.value)}><option value="member">Member</option><option value="admin">Admin</option></select></div>
    </Modal>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

  return (

          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>

        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontSize:13,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--text3)'}}>Recent tasks</h3>
            <button className="btn btn-ghost btn-sm" onClick={()=>onNav('tasks')}>View all</button>
          </div>
          {stats.recentTasks.length===0
            ? <div className="empty-state" style={{padding:'26px 0'}}><div style={{fontWeight:700}}>No tasks yet</div></div>
            : <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {stats.recentTasks.slice(0,4).map(t=>
                  <div key={t.id} className="task-card" style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}} onClick={()=>st(t)}>
                    <div style={{width:3,height:34,borderRadius:99,background:t.project?.color||'var(--accent)'}}/>
                    <div style={{flex:1,minWidth:150}}>
                      <div style={{fontWeight:700,fontSize:14}}>{t.title}</div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,flexWrap:'wrap'}}>

                        <PPill p={t.priority}/>
                      </div>
                    </div>
                    {t.project&&<span className="tag" style={{borderColor:t.project.color,color:t.project.color,fontSize:11}}>{t.project.name}</span>}
                  </div>
                )}
              </div>
          }
        </div>

        <div className="card">
          <h3 style={{marginBottom:16,fontSize:13,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--text3)'}}>Progress by status</h3>
          {Object.entries(SL).map(([s,l]) => { const c=stats.byStatus[s]; const p=stats.totalTasks>0?Math.round((c/stats.totalTasks)*100):0; const col=s==='todo'?'var(--text3)':s==='in_progress'?'var(--blue)':s==='review'?'var(--yellow)':'var(--green)'; return <div key={s} style={{marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><SPill s={s}/><span style={{fontSize:13,fontWeight:600}}>{c}</span></div><div style={{height:5,background:'var(--bg4)',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',borderRadius:99,background:col,width:p+'%',transition:'width 1s ease'}}/></div></div>; })}
          <div className="divider"/>

        </div>
      </div>
      {selTask&&<TaskDetail task={selTask} onClose={()=>st(null)} users={users} onUpdated={u=>ss(s=>({...s,recentTasks:s.recentTasks.map(t=>t.id===u.id?u:t),overdueList:s.overdueList.map(t=>t.id===u.id?u:t)}))} onDeleted={id=>ss(s=>({...s,recentTasks:s.recentTasks.filter(t=>t.id!==id),overdueList:s.overdueList.filter(t=>t.id!==id)}))}/>}

// ── PROJECT DETAIL ────────────────────────────────────────────────────────────
function ProjectDetail({ id, onBack }) {
  const { token, user } = useContext(Ctx);
  const [data, sd] = useState(null); const [tab, st] = useState('board');

  useEffect(load, [id]);
  if(!data) return <div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>Loading...</div>;
  const { project, tasks, members } = data;
  const myRole = members.find(m=>m.id===user.id)?.projectRole;
  const canMgr = user.role==='admin'||myRole==='admin';
  const byS = {}; Object.keys(SL).forEach(s=>{byS[s]=tasks.filter(t=>t.status===s);});
  const delM = async uid => { if(!confirm('Remove member?'))return; await req('DELETE','/projects/'+id+'/members/'+uid,null,token); sd(d=>({...d,members:d.members.filter(m=>m.id!==uid)})); };
  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
        <button className="btn-icon" onClick={onBack}>←</button>

        <h1 style={{fontSize:20,fontWeight:800}}>{project.name}</h1>
        {canMgr && <span className="badge badge-admin" style={{marginLeft:4}}>You&apos;re an admin</span>}
      </div>
      {project.description&&<p style={{color:'var(--text2)',marginBottom:16,fontSize:14}}>{project.description}</p>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,gap:12,flexWrap:'wrap'}}>
        <div className="tabs">{[['board','🗂 Board'],['list','📋 List'],['members','👥 Members']].map(([v,l])=><button key={v} className={'tab'+(tab===v?' active':'')} onClick={()=>st(v)}>{l}</button>)}</div>
        <div style={{display:'flex',gap:8}}>
          {canMgr&&<button className="btn btn-ghost btn-sm" onClick={()=>ssM(true)}>+ Add Member</button>}
          <button className="btn btn-primary btn-sm" onClick={()=>ssT(true)}>+ New Task</button>
        </div>
      </div>

      {tab==='board'&&<div className="kanban-board">{Object.entries(SL).map(([s])=><div key={s} className="kanban-col"><div className="kanban-col-header"><SPill s={s}/><span style={{background:'var(--bg4)',padding:'2px 8px',borderRadius:99,fontSize:12}}>{byS[s]?.length||0}</span></div><div className="kanban-col-body">{byS[s]?.map(t=><div key={t.id} className="kanban-card" onClick={()=>ss(t)}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><PPill p={t.priority}/>{t.assignee&&<Av name={t.assignee.name} sz={22}/>}</div><div style={{fontSize:13,fontWeight:600,marginBottom:4,lineHeight:1.4}}>{t.title}</div>{t.dueDate&&<div style={{fontSize:11,color:isOD(t.dueDate,t.status)?'var(--red)':'var(--text3)'}}>📅 {fmtD(t.dueDate)}</div>}</div>)}{!byS[s]?.length&&<div style={{textAlign:'center',padding:'16px 8px',color:'var(--text3)',fontSize:13}}>Empty</div>}</div></div>)}</div>}

      {tab==='list'&&<div className="card" style={{padding:0,overflow:'hidden'}}>{tasks.length===0?<div className="empty-state"><div style={{fontSize:36}}>📋</div><h2>No tasks yet</h2><button className="btn btn-primary" style={{marginTop:16}} onClick={()=>ssT(true)}>+ Create Task</button></div>
      :<table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--border)'}}>{['Task','Status','Priority','Assignee','Due',''].map(h=><th key={h} style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px'}}>{h}</th>)}</tr></thead><tbody>{tasks.map(t=><tr key={t.id} style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>ss(t)}><td style={{padding:'12px 16px'}}><div style={{fontWeight:600,fontSize:14}}>{t.title}</div>{t.description&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{t.description.slice(0,50)}{t.description.length>50?'...':''}</div>}</td><td style={{padding:'12px 16px'}}><SPill s={t.status}/></td><td style={{padding:'12px 16px'}}><PPill p={t.priority}/></td><td style={{padding:'12px 16px'}}>{t.assignee?<div style={{display:'flex',alignItems:'center',gap:8}}><Av name={t.assignee.name} sz={24}/><span style={{fontSize:13}}>{t.assignee.name}</span></div>:<span style={{color:'var(--text3)',fontSize:13}}>—</span>}</td><td style={{padding:'12px 16px'}}>{t.dueDate?<span style={{fontSize:13,color:isOD(t.dueDate,t.status)?'var(--red)':'var(--text2)'}}>{fmtD(t.dueDate)}</span>:<span style={{color:'var(--text3)'}}>—</span>}</td><td style={{padding:'12px 16px'}}>{isOD(t.dueDate,t.status)&&<span style={{color:'var(--red)',fontSize:11}}>⚠ Overdue</span>}</td></tr>)}</tbody></table>}</div>}

      {tab==='members'&&<div className="card"><div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}><h3 style={{fontSize:15}}>{members.length} Member{members.length!==1?'s':''}</h3>{canMgr&&<button className="btn btn-ghost btn-sm" onClick={()=>ssM(true)}>+ Add</button>}</div>{members.map(m=><div key={m.id} className="member-row"><Av name={m.name} sz={36}/><div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{m.name}</div><div style={{fontSize:12,color:'var(--text3)'}}>{m.email}</div></div><span className={'badge badge-'+(m.projectRole||'member')}>{m.projectRole||'member'}</span>{canMgr&&m.id!==user.id&&<button className="btn-icon" onClick={()=>delM(m.id)} style={{color:'var(--red)',borderColor:'rgba(239,68,68,.3)'}}>✕</button>}</div>)}</div>}

      {showT&&<CreateTask projectId={id} users={members} onClose={()=>ssT(false)} onDone={t=>sd(d=>({...d,tasks:[...d.tasks,t]}))}/>}
      {showM&&<AddMember projectId={id} onClose={()=>ssM(false)} onAdded={m=>sd(d=>({...d,members:[...d.members,{id:m.userId,name:m.user.name,email:m.user.email,projectRole:m.role}]}))}/>}
      {sel&&<TaskDetail task={sel} onClose={()=>ss(null)} users={members} onUpdated={u=>sd(d=>({...d,tasks:d.tasks.map(t=>t.id===u.id?u:t)}))} onDeleted={id2=>sd(d=>({...d,tasks:d.tasks.filter(t=>t.id!==id2)}))}/>}
    </div>
  );
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function Tasks() {
  const { token, user } = useContext(Ctx);
  const [tasks, st] = useState([]); const [projects, sp] = useState([]); const [users, su] = useState([]);
  const [loading, sl] = useState(true); const [show, ss] = useState(false); const [sel, ssel] = useState(null);
  const [flt, sf] = useState({ status:'', priority:'', projectId:'' });
  useEffect(() => {
    Promise.all([req('GET','/tasks',null,token),req('GET','/projects',null,token),req('GET','/auth/users',null,token)])
      .then(([t,p,u])=>{st(t.tasks);sp(p.projects);su(u.users);sl(false);});
  }, []);
  const filt = tasks.filter(t=>(!flt.status||t.status===flt.status)&&(!flt.priority||t.priority===flt.priority)&&(!flt.projectId||t.projectId===flt.projectId));
  return (
    <div className="fade-in">
      <div className="page-header">
        <div>
          <h1 style={{fontSize:24,fontWeight:800}}>Tasks</h1>
          <p style={{color:'var(--text2)',fontSize:14}}>{user.role==='member'?'Tasks from your assigned projects':'All workspace tasks'} · {filt.length} shown</p>
        </div>
        <button className="btn btn-primary" onClick={()=>ss(true)}>+ New Task</button>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
        <select className="form-input" style={{maxWidth:150}} value={flt.status} onChange={e=>sf(f=>({...f,status:e.target.value}))}><option value="">All Status</option>{Object.entries(SL).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
        <select className="form-input" style={{maxWidth:150}} value={flt.priority} onChange={e=>sf(f=>({...f,priority:e.target.value}))}><option value="">All Priority</option>{['low','medium','high','critical'].map(p=><option key={p} value={p}>{p}</option>)}</select>
        <select className="form-input" style={{maxWidth:200}} value={flt.projectId} onChange={e=>sf(f=>({...f,projectId:e.target.value}))}><option value="">All Projects</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
        {(flt.status||flt.priority||flt.projectId)&&<button className="btn btn-ghost btn-sm" onClick={()=>sf({status:'',priority:'',projectId:''})}>Clear</button>}
      </div>
      {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text3)'}}>Loading...</div>
      : filt.length===0 ? <div className="empty-state"><div style={{fontSize:48,opacity:.5,marginBottom:16}}>📋</div><h2>No tasks found</h2><p style={{color:'var(--text2)',margin:'8px 0 20px'}}>Create a task or adjust filters</p><button className="btn btn-primary" onClick={()=>ss(true)}>+ Create Task</button></div>
      : <div style={{display:'flex',flexDirection:'column',gap:8}}>{filt.map(t=><div key={t.id} className={'task-card'+(isOD(t.dueDate,t.status)?' overdue':'')} style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}} onClick={()=>ssel(t)}><SPill s={t.status}/><div style={{flex:1,minWidth:180}}><div style={{fontWeight:600,fontSize:14}}>{t.title}</div>{t.description&&<div style={{fontSize:12,color:'var(--text3)'}}>{t.description.slice(0,60)}{t.description.length>60?'...':''}</div>}</div><PPill p={t.priority}/>{t.project&&<span className="tag" style={{borderColor:t.project.color,color:t.project.color}}>{t.project.name}</span>}{t.assignee?<div style={{display:'flex',alignItems:'center',gap:6}}><Av name={t.assignee.name} sz={24}/><span style={{fontSize:12,color:'var(--text2)'}}>{t.assignee.name}</span></div>:<span style={{fontSize:12,color:'var(--text3)'}}>Unassigned</span>}{t.dueDate&&<span style={{fontSize:12,color:isOD(t.dueDate,t.status)?'var(--red)':'var(--text3)',whiteSpace:'nowrap'}}>📅 {fmtD(t.dueDate)}</span>}</div>)}</div>}
      {show&&<CreateTask projects={projects} users={users} onClose={()=>ss(false)} onDone={t=>st(ts=>[t,...ts])}/>}
      {sel&&<TaskDetail task={sel} onClose={()=>ssel(null)} users={users} onUpdated={u=>st(ts=>ts.map(t=>t.id===u.id?u:t))} onDeleted={id=>st(ts=>ts.filter(t=>t.id!==id))}/>}
    </div>
  );
}

        <Av name={u.name} sz={56}/>
        <div><div style={{fontFamily:'Syne',fontWeight:700,fontSize:16,marginBottom:4}}>{u.name}</div><div style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>{u.email}</div><span className={'badge badge-'+u.role}>{u.role==='admin'?'🛡️ ':'👤 '}{u.role}</span></div>
        {u.id===user.id&&<span style={{fontSize:12,color:'var(--text3)'}}>That&apos;s you!</span>}
        <div style={{fontSize:12,color:'var(--text3)'}}>Joined {fmtD(u.createdAt)}</div>
      </div>)}</div>}
    </div>
  );
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function Shell() {
  const { user, logout } = useContext(Ctx);
  const [page, sp] = useState('dashboard');
  const [projId, spj] = useState(null);
  const isAdmin = user.role === 'admin';
  const nav = (p, id) => { sp(p); if(id) spj(id); };

  // Nav items — admins get full access, members see locked items
  const navItems = [
    { id:'dashboard', icon:'⚡', label:'Dashboard', access: true },
    { id:'projects',  icon:'📁', label:'Projects',  access: true },
    { id:'tasks',     icon:'✅', label:'Tasks',      access: true },
    { id:'team',      icon:'👥', label:'Team',       access: true },
  ];

  const renderPage = () => {
    if(page==='project'&&projId) return <ProjectDetail id={projId} onBack={()=>sp('projects')}/>;
    switch(page) {
      case 'dashboard': return <Dashboard onNav={nav}/>;
      case 'projects':  return <Projects onNav={nav}/>;
      case 'tasks':     return <Tasks/>;
      case 'team':      return <Team/>;
      default:          return <Dashboard onNav={nav}/>;
    }
  };

  return (
    <div className="app">
      <main className="main main-framed">
        <div className="shell-wrap">
          <div className="topbar topbar-framer">
            <div className="brand-chip">
              <div style={{width:7,height:7,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),var(--accent2))'}}/>
              <span>TaskFlow</span>
            </div>

            <div className="top-nav">
              {navItems.map(n => (
                <button
                  key={n.id}
                  className={`top-nav-item ${page===n.id||(page==='project'&&n.id==='projects')?'active':''}`}
                  onClick={() => nav(n.id)}
                >
                  {n.label}
                </button>
              ))}
            </div>

            <div className="top-actions">
              <div className={`role-chip ${isAdmin?'admin':'member'}`}>
                {isAdmin?'🛡️ Admin':'👤 Member'}
              </div>
              <Av name={user.name} sz={30}/>
              <button className="btn-icon" onClick={logout} title="Sign out" style={{fontSize:14}}>⎋</button>
            </div>
          </div>

          <div className="content content-framed">{renderPage()}</div>
        </div>
      </main>

      <div className="mobile-nav">
        {navItems.map(n => (
          <button
            key={n.id}
            className={`mobile-nav-item ${page===n.id||(page==='project'&&n.id==='projects')?'active':''}`}
            onClick={() => nav(n.id)}
          >
            <span style={{fontSize:15}}>{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
        <button className="mobile-nav-item" onClick={logout}>
          <span style={{fontSize:15}}>⎋</span>
          <span>Sign out</span>
        </button>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const { user, loading } = useContext(Ctx);
  // Role the user selected on the picker screen (before login)
  const [pickedRole, setPicked] = useState(null);

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:16}}>⚡</div><span style={{display:'inline-block',width:20,height:20,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%'}} className="spin"/></div>
    </div>
  );

  if(user) return <Shell/>;

  // Step 1: pick role
  if(!pickedRole) return <RolePicker onPick={setPicked}/>;

  // Step 2: login/signup with role context
  return <AuthPage pickedRole={pickedRole} onChangeRole={() => setPicked(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Provider><App/></Provider>
);
</script>
</body>
</html>
